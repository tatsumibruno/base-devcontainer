services:
  dev:
    build:
      context: .
      dockerfile: Dockerfile
    image: devcontainer:latest
    tty: true
    stdin_open: true
    working_dir: /workspace
    volumes:
      - ./workspace:/workspace
      - ./claude-settings.json:/workspace/.claude/settings.json
      - ./codex-config.toml:/workspace/.codex/config.toml
    extra_hosts:
      - "host.docker.internal:host-gateway"